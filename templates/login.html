<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
        }

        .login-box {
            width: 300px;
            margin: 120px auto;
            background: white;
            padding: 25px;
            box-shadow: 0px 3px 8px rgba(0,0,0,0.2);
            border-radius: 5px;
            text-align: center;
        }

        input {
            width: 90%;
            padding: 8px;
            margin: 10px 0;
        }

        button {
            padding: 8px 15px;
            background: #2874f0;
            color: white;
            border: none;
        }
    </style>
</head>

<body>
<div class="login-box">
    <h2>Priya Store Login</h2>
    <form method="post">
        <input type="text" name="username" placeholder="Username"><br>
        <input type="password" name="password" placeholder="Password"><br>
        <button type="submit">Login</button>
    </form>
</div>
</body>
</html>
