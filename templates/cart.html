<!DOCTYPE html>
<html>
<head>
    <title>Your Cart</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
        }

        .container {
            width: 70%;
            margin: 40px auto;
            background: white;
            padding: 20px;
            box-shadow: 0px 2px 6px rgba(0,0,0,0.2);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: #2874f0;
            color: white;
        }

        a {
            text-decoration: none;
            color: #2874f0;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Your Cart</h2>

    {% if cart %}
    <table>
        <tr>
            <th>Product</th>
            <th>Quantity</th>
            <th>Price</th>
            <th>Total</th>
            <th>Remove</th>
        </tr>

        {% for item, qty in cart.items() %}
        <tr>
            <td>{{ item }}</td>
            <td>{{ qty }}</td>
            <td>₹{{ price }}</td>
            <td>₹{{ qty * price }}</td>
            <td><a href="/remove/{{ item }}">Remove</a></td>
        </tr>
        {% endfor %}
    </table>

    <h3>Total Amount: ₹{{ total }}</h3>
    {% else %}
        <p>Your cart is empty.</p>
    {% endif %}

    <br>
    <a href="/">← Continue Shopping</a>
</div>

</body>
</html>
